<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Próxima Carrera</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="header">
            <span class="live-badge">PRÓXIMO EVENTO</span>
            <h1 id="gran-premio">Cargando carrera...</h1>
        </div>
        
        <div class="content">
            <div class="info-group">
                <span class="label">País</span>
                <p id="pais" class="value">-</p>
            </div>
            <div class="info-group">
                <span class="label">Ronda</span>
                <p id="ronda" class="value">-</p>
            </div>
            <div class="info-group">
                <span class="label">Fecha</span>
                <p id="fecha" class="value">-</p>
            </div>
            <div class="info-group">
                <span class="label">Hora Oficial (UTC)</span>
                <p id="hora" class="value">-</p>
            </div>
        </div>
    </div>

    <script>
        // Esta es la magia que lee el archivo JSON que generó tu Python
        fetch('datos.json')
            .then(response => response.json())
            .then(data => {
                // Reemplazamos los textos de la página con los datos reales
                document.getElementById('gran-premio').innerText = data.nombre_gran_premio;
                document.getElementById('pais').innerText = data.pais;
                document.getElementById('ronda').innerText = data.ronda;
                document.getElementById('fecha').innerText = data.fecha_carrera;
                document.getElementById('hora').innerText = data.hora_carrera + " hs";
            })
            .catch(error => {
                console.error("Error cargando los datos de la F1:", error);
                document.getElementById('gran-premio').innerText = "Error al cargar datos";
            });
    </script>
</body>
</html>
